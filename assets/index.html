<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COMPACS RAG</title>
<style>
:root {
  --bg: #f0f2f8;
  --card: #fff;
  --text: #1a1a2e;
  --muted: #64748b;
  --accent: #1d4ed8;
  --accent-hover: #1e40af;
  --danger: #dc2626;
  --border: #e2e8f0;
  --answer-bg: #0f172a;
  --answer-fg: #e2e8f0;
  font-family: "Segoe UI", system-ui, sans-serif;
  color: var(--text);
  background: var(--bg);
}
* { box-sizing: border-box; }
body { margin: 0; padding: 16px; max-width: 900px; margin-inline: auto; }
header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
h1 { font-size: 1.35rem; margin: 0; }
.status { font-size: 13px; color: var(--muted); }
.status.ok { color: #15803d; }
.status.err { color: var(--danger); }
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 18px;
  box-shadow: 0 1px 4px rgba(0,0,0,.07);
}
label { display: block; font-weight: 600; margin-top: 10px; font-size: 14px; }
textarea, button {
  font: inherit;
  width: 100%;
  margin: 6px 0 12px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
}
button {
  width: auto;
  background: var(--accent);
  color: #fff;
  border: 0;
  cursor: pointer;
  padding: 10px 18px;
}
button:hover { background: var(--accent-hover); }
button:disabled { opacity: .55; cursor: not-allowed; }
.muted { color: var(--muted); font-size: 13px; }
#answer {
  min-height: 160px;
  white-space: pre-wrap;
  background: var(--answer-bg);
  color: var(--answer-fg);
  padding: 14px;
  border-radius: 8px;
  margin-top: 8px;
  font-size: 14px;
  line-height: 1.5;
}
</style>
</head>
<body>
<header>
  <h1>COMPACS RAG</h1>
  <span id="health" class="status">Загрузка…</span>
</header>

<section class="card">
  <p class="muted">Локальный RAG: векторная база в main.exe → llama-server (embed + chat).</p>
  <label for="question">Вопрос</label>
  <textarea id="question" rows="4" placeholder="Задайте вопрос по документации…"></textarea>
  <button type="button" id="ask">Спросить</button>
  <div id="answer">Ответ появится здесь.</div>
</section>

<script>
const API = window.COMPACS_API_BASE || "__COMPACS_API_BASE__";

function $(id) { return document.getElementById(id); }

async function refreshInfo() {
  const el = $("health");
  try {
    const res = await fetch(API + "/api/info");
    const data = await res.json();
    if (res.ok) {
      el.textContent = data.chunks + " чанков, dim=" + data.dim + " | " + data.llama;
      el.className = "status ok";
    } else {
      el.textContent = data.error || "Ошибка";
      el.className = "status err";
    }
  } catch (e) {
    el.textContent = "API недоступен";
    el.className = "status err";
  }
}

// Idle watchdog: if no data/token arrives within this window, abort so the UI
// shows an error instead of spinning on "Поиск контекста…" forever.
const ASK_IDLE_TIMEOUT_MS = 180000;

function renderAnswer(answerEl, answer, sources) {
  const srcText = (sources || []).map(s => "- " + s.source + ", стр. " + s.page).join("\n");
  answerEl.textContent = (answer || "(пустой ответ)") + (srcText ? "\n\nИсточники:\n" + srcText : "");
}

$("ask").onclick = async () => {
  const question = $("question").value.trim();
  if (!question) return;
  const answerEl = $("answer");
  const btn = $("ask");
  btn.disabled = true;
  answerEl.textContent = "Поиск контекста…";

  const controller = new AbortController();
  let watchdog = setTimeout(() => controller.abort(), ASK_IDLE_TIMEOUT_MS);
  const bump = () => {
    clearTimeout(watchdog);
    watchdog = setTimeout(() => controller.abort(), ASK_IDLE_TIMEOUT_MS);
  };

  let answer = "";
  let finished = false;
  try {
    const res = await fetch(API + "/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, stream: true }),
      signal: controller.signal,
    });
    if (res.status === 429) {
      answerEl.textContent = "Модель занята — дождитесь окончания предыдущего вопроса.";
      return;
    }
    if (!res.ok || !res.body) {
      let detail = res.statusText;
      try { detail = (await res.json()).error || detail; } catch (_) {}
      answerEl.textContent = "Ошибка: " + detail;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let buf = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      bump();
      buf += decoder.decode(value, { stream: true });
      let sep;
      while ((sep = buf.indexOf("\n\n")) !== -1) {
        const frame = buf.slice(0, sep);
        buf = buf.slice(sep + 2);
        let ev = "message";
        let data = "";
        for (const line of frame.split("\n")) {
          if (line.startsWith("event:")) ev = line.slice(6).trim();
          else if (line.startsWith("data:")) data += line.slice(5).trim();
        }
        if (!data) continue;
        let obj;
        try { obj = JSON.parse(data); } catch (_) { continue; }
        if (ev === "status") {
          if (obj.phase === "retrieval") answerEl.textContent = "Поиск контекста…";
          else if (obj.phase === "generation") answerEl.textContent = "Генерация ответа…";
        } else if (ev === "token") {
          answer += obj.text || "";
          answerEl.textContent = answer || "Генерация ответа…";
        } else if (ev === "done") {
          finished = true;
          if (obj.error) answerEl.textContent = "Ошибка: " + obj.error;
          else renderAnswer(answerEl, obj.answer || answer, obj.sources);
        }
      }
    }
    if (!finished) {
      answerEl.textContent = answer
        ? answer + "\n\n[поток прерван до завершения]"
        : "Ошибка: ответ не получен (соединение закрылось преждевременно).";
    }
  } catch (err) {
    if (err && err.name === "AbortError") {
      answerEl.textContent = "Ошибка: превышено время ожидания ответа модели.";
    } else {
      answerEl.textContent = "Ошибка сети: " + (err && err.message ? err.message : err);
    }
  } finally {
    clearTimeout(watchdog);
    btn.disabled = false;
  }
};

$("question").addEventListener("keydown", e => {
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) $("ask").click();
});

refreshInfo();
</script>
</body>
</html>
