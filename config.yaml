# COMPACS Desktop — runtime config (env > this file > code defaults).
# Profile: hybrid_dense_3b_cpu + rerank + collection routing + map-reduce.
# Latency: chunk_chars 800; context_chunks 6; top_k 12 retrieve pool.
#
# similarity_threshold: cosine DISTANCE (1 - similarity). Keep hit if distance < threshold.
# Tuned 0.30 (wider pool; BM25 pulls lexical matches). Stand default was 0.35.

models:
  # Drop-in swap: put GGUF in models/ and change generator filename.
  # Candidates for A/B (~1.8–2.0 GB Q4): Qwen2.5-3B-Instruct, Phi-3-mini-4k-instruct
  generator: models/llama3.2-3b-instruct-q4_K_M.gguf
  embedder: models/nomic-embed-text.gguf
  embed_model: nomic-embed-text

server:
  host: 127.0.0.1
  port: 8081
  gen_port: 8082
  embed_port: 8081
  timeouts:
    connect_sec: 5
    completion_read_sec: 300
    embed_read_sec: 90

retrieval:
  vector_store: vectors.bin
  lemma_map: lemma_map.tsv
  hybrid_enabled: true
  rerank_enabled: true
  collection_routing_enabled: true
  map_reduce_enabled: false
  # retrieve pool → rerank → context_chunks
  top_k: 12
  rerank_top_k: 8
  similarity_threshold: 0.206
  context_chunks: 3
  chunk_chars: 1000
  query_max_chars: 2048
  map_reduce_max_chunks: 6
  map_chunk_chars: 400
  map_num_predict: 120

generation:
  temperature: 0.1
  num_predict: 200
  num_ctx: 8192

prompt:
  system: |
    Отвечай ТОЛЬКО по фрагментам контекста ниже и только на русском языке.
    Структурируй ответ кратко: 2–5 предложений по сути вопроса.
    Если в контексте нет ответа — напиши ровно: NOT FOUND in documentation.
    Не выдумывай факты. В конце укажи источники: файл и страница.

  not_found: NOT FOUND in documentation

ui:
  port: 8765
  title: COMPACS RAG
  width: 1024
  height: 720
  assets_dir: assets
